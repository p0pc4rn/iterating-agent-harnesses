<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="820" height="340" fill="#f8f9fb" rx="8"/>
  <text x="30" y="34" font-size="14" font-weight="700" fill="#1a2233">Complexity is conserved: only moved between layers, never created or destroyed</text>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#c0392b"/>
    </marker>
    <marker id="m2" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M9,0 L0,4.5 L9,9 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Bar A: start -->
  <text x="20" y="104" font-size="13" font-weight="600" fill="#5a6472">start</text>
  <g>
    <rect x="70"  y="76" width="300" height="52" fill="#e7d9c4" stroke="#c9b48f" stroke-width="1"/>
    <rect x="370" y="76" width="130" height="52" fill="#cfe0f3" stroke="#9bbbe0" stroke-width="1"/>
    <rect x="500" y="76" width="110" height="52" fill="#d7ecdc" stroke="#9fceb1" stroke-width="1"/>
    <rect x="610" y="76" width="150" height="52" fill="#d9dde3" stroke="#b3bac6" stroke-width="1"/>
    <text x="220" y="107" font-size="13" fill="#5b4a2e" text-anchor="middle">model improv</text>
    <text x="435" y="107" font-size="12" fill="#234a73" text-anchor="middle">orchestration</text>
    <text x="555" y="107" font-size="13" fill="#1f5236" text-anchor="middle">units</text>
    <text x="685" y="107" font-size="12" fill="#3a4250" text-anchor="middle">generic harness</text>
  </g>

  <!-- iterate arrow -->
  <path d="M 130 132 L 130 200" stroke="#c0392b" stroke-width="2" marker-end="url(#ah)"/>
  <text x="142" y="172" font-size="12" fill="#c0392b" font-weight="600">iterate</text>

  <!-- Bar B: after -->
  <text x="20" y="238" font-size="13" font-weight="600" fill="#5a6472">after</text>
  <g>
    <rect x="70"  y="210" width="130" height="52" fill="#e7d9c4" stroke="#c9b48f" stroke-width="1"/>
    <rect x="200" y="210" width="230" height="52" fill="#cfe0f3" stroke="#9bbbe0" stroke-width="1"/>
    <rect x="430" y="210" width="180" height="52" fill="#d7ecdc" stroke="#9fceb1" stroke-width="1"/>
    <rect x="610" y="210" width="150" height="52" fill="#d9dde3" stroke="#b3bac6" stroke-width="1"/>
    <text x="135" y="241" font-size="11" fill="#5b4a2e" text-anchor="middle">model improv</text>
    <text x="315" y="241" font-size="13" fill="#234a73" text-anchor="middle">orchestration (more seams)</text>
    <text x="520" y="241" font-size="13" fill="#1f5236" text-anchor="middle">units (agents / skills)</text>
    <text x="685" y="241" font-size="12" fill="#3a4250" text-anchor="middle">generic harness</text>
  </g>

  <!-- generic harness constant boundary -->
  <line x1="610" y1="70" x2="610" y2="268" stroke="#8a93a3" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="685" y="286" font-size="11.5" fill="#8a93a3" text-anchor="middle">generic harness: constant</text>

  <!-- conservation measure -->
  <line x1="70" y1="304" x2="760" y2="304" stroke="#6b7280" stroke-width="1" marker-start="url(#m2)" marker-end="url(#m2)"/>
  <rect x="300" y="295" width="230" height="18" fill="#f8f9fb"/>
  <text x="415" y="308" font-size="12" fill="#6b7280" text-anchor="middle" font-weight="600">total width conserved (same in both rows)</text>
</svg>
