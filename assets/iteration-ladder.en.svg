<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="430" fill="#f8f9fb" rx="8"/>
  <text x="30" y="34" font-size="15" font-weight="700" fill="#1a2233">Iteration ladder: pick the lowest rung that holds (cost rises top to bottom)</text>

  <!-- cost axis -->
  <line x1="32" y1="60" x2="32" y2="392" stroke="#9aa3b2" stroke-width="2" marker-end="url(#dn)"/>
  <defs>
    <marker id="dn" markerWidth="9" markerHeight="9" refX="4.5" refY="7" orient="auto">
      <path d="M0,0 L9,0 L4.5,9 z" fill="#9aa3b2"/>
    </marker>
  </defs>
  <text x="20" y="228" font-size="11.5" fill="#9aa3b2" transform="rotate(-90 20 228)" text-anchor="middle">system cost rises</text>

  <!-- row 0 -->
  <rect x="50" y="58"  width="620" height="46" rx="6" fill="#eceef2" stroke="#cfd5df" stroke-width="1"/>
  <circle cx="76" cy="81" r="13" fill="#9aa3b2"/><text x="76" y="86" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">0</text>
  <text x="100" y="86" font-size="13.5" font-weight="700" fill="#3a4250">Run · locate · classify</text>
  <text x="290" y="86" font-size="11" fill="#5a6472">run real cases; tag essential / compensatory on the spot</text>

  <!-- row 1 -->
  <rect x="50" y="112" width="620" height="46" rx="6" fill="#dbeafe" stroke="#9bbbe0" stroke-width="1"/>
  <circle cx="76" cy="135" r="13" fill="#2f6fb0"/><text x="76" y="140" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">1</text>
  <text x="100" y="140" font-size="13.5" font-weight="700" fill="#234a73">Change a unit's insides</text>
  <text x="290" y="140" font-size="11" fill="#3f5a78">inside one boundary, seams untouched, cheapest</text>

  <!-- row 2 -->
  <rect x="50" y="166" width="620" height="46" rx="6" fill="#dbeafe" stroke="#9bbbe0" stroke-width="1"/>
  <circle cx="76" cy="189" r="13" fill="#2f6fb0"/><text x="76" y="194" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">2</text>
  <text x="100" y="194" font-size="13.5" font-weight="700" fill="#234a73">Change a contract (seam)</text>
  <text x="290" y="194" font-size="11" fill="#3f5a78">spans two units: fix the contract, not both insides</text>

  <!-- row 3 -->
  <rect x="50" y="220" width="620" height="46" rx="6" fill="#dbeafe" stroke="#9bbbe0" stroke-width="1"/>
  <circle cx="76" cy="243" r="13" fill="#2f6fb0"/><text x="76" y="248" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">3</text>
  <text x="100" y="248" font-size="13.5" font-weight="700" fill="#234a73">Add a unit</text>
  <text x="290" y="248" font-size="11" fill="#3f5a78">separable new concern; isolate &#8594; agent, reuse &#8594; skill</text>

  <!-- row 4 (highlight) -->
  <rect x="50" y="274" width="620" height="46" rx="6" fill="#fdecc8" stroke="#e0a93b" stroke-width="2"/>
  <circle cx="76" cy="297" r="13" fill="#c77f0a"/><text x="76" y="302" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">4</text>
  <text x="100" y="302" font-size="13.5" font-weight="700" fill="#7a4f06">Re-cut a boundary</text>
  <text x="290" y="302" font-size="11" fill="#7a4f06">same seam keeps throwing fixups &#8594; the cut was wrong</text>

  <!-- row 5 (highlight) -->
  <rect x="50" y="328" width="620" height="46" rx="6" fill="#fdecc8" stroke="#e0a93b" stroke-width="2"/>
  <circle cx="76" cy="351" r="13" fill="#c77f0a"/><text x="76" y="356" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">5</text>
  <text x="100" y="356" font-size="13.5" font-weight="700" fill="#7a4f06">Merge / delete</text>
  <text x="290" y="356" font-size="11" fill="#7a4f06">two units are really one, or one is obsolete compensation</text>

  <!-- brace + callout on 4-5 -->
  <path d="M 680 274 q 8 0 8 8 v 30 q 0 8 8 8 q -8 0 -8 8 v 30 q 0 8 -8 8" fill="none" stroke="#c0392b" stroke-width="1.6"/>
  <text x="704" y="312" font-size="11" font-weight="700" fill="#c0392b">the destructive moves</text>
  <text x="704" y="327" font-size="11" font-weight="700" fill="#c0392b">"tweak or add" drops.</text>
  <text x="704" y="344" font-size="11" fill="#c0392b">skip them and the</text>
  <text x="704" y="358" font-size="11" fill="#c0392b">system ossifies.</text>
</svg>
