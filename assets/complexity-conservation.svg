<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="760" height="330" fill="#f8f9fb" rx="8"/>
  <text x="30" y="34" font-size="16" font-weight="700" fill="#1a2233">复杂度守恒：迭代不创造也不消灭复杂度，只把它从一层搬到另一层</text>

  <!-- Bar A: 起步 -->
  <text x="20" y="98" font-size="13" font-weight="600" fill="#5a6472">起步</text>
  <g>
    <rect x="60"  y="74" width="300" height="52" fill="#e7d9c4" stroke="#c9b48f" stroke-width="1"/>
    <rect x="360" y="74" width="110" height="52" fill="#cfe0f3" stroke="#9bbbe0" stroke-width="1"/>
    <rect x="470" y="74" width="110" height="52" fill="#d7ecdc" stroke="#9fceb1" stroke-width="1"/>
    <rect x="580" y="74" width="120" height="52" fill="#d9dde3" stroke="#b3bac6" stroke-width="1"/>
    <text x="210" y="105" font-size="13" fill="#5b4a2e" text-anchor="middle">模型自由发挥</text>
    <text x="415" y="105" font-size="13" fill="#234a73" text-anchor="middle">编排</text>
    <text x="525" y="105" font-size="13" fill="#1f5236" text-anchor="middle">单元</text>
    <text x="640" y="105" font-size="13" fill="#3a4250" text-anchor="middle">通用 harness</text>
  </g>

  <!-- arrow -->
  <text x="42" y="160" font-size="13" fill="#c0392b" font-weight="600">搬</text>
  <text x="42" y="176" font-size="13" fill="#c0392b" font-weight="600">家</text>
  <path d="M 130 132 L 130 196" stroke="#c0392b" stroke-width="2" marker-end="url(#ar)"/>
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Bar B: 迭代后 -->
  <text x="20" y="232" font-size="13" font-weight="600" fill="#5a6472">迭代后</text>
  <g>
    <rect x="60"  y="208" width="120" height="52" fill="#e7d9c4" stroke="#c9b48f" stroke-width="1"/>
    <rect x="180" y="208" width="200" height="52" fill="#cfe0f3" stroke="#9bbbe0" stroke-width="1"/>
    <rect x="380" y="208" width="200" height="52" fill="#d7ecdc" stroke="#9fceb1" stroke-width="1"/>
    <rect x="580" y="208" width="120" height="52" fill="#d9dde3" stroke="#b3bac6" stroke-width="1"/>
    <text x="120" y="239" font-size="12" fill="#5b4a2e" text-anchor="middle">模型自由发挥</text>
    <text x="280" y="239" font-size="13" fill="#234a73" text-anchor="middle">编排（接缝变多）</text>
    <text x="480" y="239" font-size="13" fill="#1f5236" text-anchor="middle">单元 agent / skill</text>
    <text x="640" y="239" font-size="13" fill="#3a4250" text-anchor="middle">通用 harness</text>
  </g>

  <!-- harness fixed boundary -->
  <line x1="580" y1="68" x2="580" y2="266" stroke="#8a93a3" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="640" y="284" font-size="11.5" fill="#8a93a3" text-anchor="middle">通用 harness 恒定</text>

  <!-- conservation measure -->
  <line x1="60" y1="300" x2="700" y2="300" stroke="#6b7280" stroke-width="1" marker-start="url(#ar2)" marker-end="url(#ar2)"/>
  <defs>
    <marker id="ar2" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M9,0 L0,4.5 L9,9 z" fill="#6b7280"/>
    </marker>
  </defs>
  <rect x="300" y="291" width="160" height="18" fill="#f8f9fb"/>
  <text x="380" y="304" font-size="12" fill="#6b7280" text-anchor="middle" font-weight="600">总量守恒（同宽）</text>
</svg>
